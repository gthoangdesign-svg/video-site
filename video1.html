<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truyện Cổ Tích Việt Nam</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Be+Vietnam+Pro:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f0e8;
      font-family: 'Be Vietnam Pro', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .video-wrap {
      width: 100%;
      max-width: 480px;
      background: #000;
    }

    .video-wrap video {
      width: 100%;
      display: block;
      pointer-events: none;
    }

    .content {
      width: 100%;
      max-width: 480px;
      padding: 32px 24px 48px;
      text-align: center;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      color: #8b2c0e;
      line-height: 1.3;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin-bottom: 20px;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #c4882a;
      margin: 0 auto 20px;
      border-radius: 2px;
    }

    .desc {
      font-size: 15px;
      font-weight: 300;
      color: #4a3728;
      line-height: 1.8;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 32px;
    }

    .nav a {
      font-size: 13px;
      font-weight: 500;
      color: #8b2c0e;
      text-decoration: none;
      padding: 8px 20px;
      border: 1px solid #c4882a;
      border-radius: 24px;
      transition: all 0.2s;
    }

    .nav a:hover {
      background: #8b2c0e;
      color: #f5f0e8;
    }

    .brand {
      margin-top: 24px;
      font-size: 11px;
      color: #a89070;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

  <div class="video-wrap">
    <video autoplay loop muted playsinline>
      <source src="https://res.cloudinary.com/duuvg9vux/video/upload/v1780250885/B%C3%ACa_n5b6c6.mp4" type="video/mp4" />
    </video>
  </div>

  <div class="content">
    <h1 class="title">Truyện Cổ Tích Việt Nam</h1>
    <div class="divider"></div>
    <p class="desc">Kho tàng cổ tích Việt Nam — nơi lưu giữ những câu chuyện dân gian ngàn đời, gắn liền với hồn dân tộc và ký ức tuổi thơ.</p>
